{{- if .Values.monitoring.dashboard.enabled }}
# Grafana picks this up automatically: its sidecar watches every namespace for
# ConfigMaps labelled `grafana_dashboard: "1"` and provisions their JSON. The
# dashboard's datasource template variable resolves to Grafana's default
# Prometheus datasource, so nothing here needs to know it's called
# "victoriametrics".
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    grafana_dashboard: "1"
data:
  bluer-book.json: |-
{{ .Files.Get "dashboards/dashboard.json" | indent 4 }}
{{- end }}
