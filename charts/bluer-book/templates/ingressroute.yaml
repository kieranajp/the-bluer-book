{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/mcp`)
      services:
        - name: {{ .Release.Name }}-mcp
          port: {{ .Values.mcp.service.port }}
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`)
      {{- if .Values.ingress.middlewares }}
      middlewares:
        {{- range .Values.ingress.middlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.app.service.port }}
  tls:
    certResolver: letsencrypt
{{- end }}
