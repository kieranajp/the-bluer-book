app:
  replicaCount: 1
  image:
    repository: ghcr.io/kieranajp/the-bluer-book
    tag: latest
  service:
    port: 8080
    type: ClusterIP
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17.5-alpine"
  persistence:
    enabled: true
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

ingress:
  enabled: true
  host: "recipes.kieranajp.uk"
  middlewares:
    - name: ory-auth
      namespace: auth

mcp:
  service:
    port: 8082

gemini:
  # Gemini model used by the chat handler and the tag-recipes job.
  model: "gemini-3.5-flash"

r2:
  accountId: ""
  bucket: "bluer-book-images"
  publicUrl: ""

secretName: bluer-book-secrets

# Secret values live in 1Password (Homelab vault). The onepassword-connect
# operator materialises a k8s Secret named `secretName` from this item.
# The item must contain: DB_USER, DB_PASS, DB_NAME, DB_HOST, DB_PORT, GOOGLE_API_KEY,
# R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY.
# Keep DB_PASS in sync with the existing postgres PVC (currently "xxx").
onepassword:
  vault: Homelab
  item: bluer-book-secrets
