app:
  replicaCount: 1
  image:
    repository: ghcr.io/kieranajp/the-bluer-book
    tag: latest
  service:
    port: 8080
    type: ClusterIP
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17.5-alpine"
  persistence:
    enabled: true
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

ingress:
  enabled: true
  host: "recipes.kieranajp.uk"
  middlewares:
    - name: ory-auth
      namespace: auth

# NetworkPolicy restricting inbound traffic to the app pods so the only route to
# the API/MCP ports is via the Traefik edge (which authenticates and sets X-User
# from a verified credential). The backend trusts X-User without verifying any
# token, so this "no in-cluster bypass" guarantee is load-bearing — without it
# any pod can curl the Service directly with a forged X-User and impersonate a user.
#
# SHIPS DISABLED. The selectors below are cluster-specific; a wrong one silently
# drops all ingress (or all metric scrapes), and deploy.yml auto-deploys main.
# Confirm the real labels before enabling, e.g.:
#   kubectl get ns --show-labels
#   kubectl -n <traefik-ns> get pod --show-labels
#   kubectl -n <monitoring-ns> get pod --show-labels
# then set networkPolicy.enabled: true.
networkPolicy:
  enabled: false
  ingress:
    traefik:
      # Traefik ingress controller location. `kubernetes.io/metadata.name` is the
      # automatic per-namespace label (k8s >= 1.21). Defaults are common, not certain.
      namespaceSelector:
        kubernetes.io/metadata.name: traefik
      podSelector:
        app.kubernetes.io/name: traefik
    monitoring:
      # Allow Prometheus to scrape /metrics on the app port. Set enabled: false if
      # you don't scrape, or scrape node-locally.
      enabled: true
      namespaceSelector:
        kubernetes.io/metadata.name: monitoring
      # Narrow to the Prometheus pods if you like; {} = the whole namespace.
      podSelector: {}
    # Raw extra ingress rules (a NetworkPolicyIngressRule list), e.g. to allow the
    # kubelet probe source on CNIs that enforce policy against health checks.
    extra: []

mcp:
  service:
    port: 8082

monitoring:
  dashboard:
    # Ships the Grafana dashboard (charts/bluer-book/dashboards/dashboard.json)
    # as a labelled ConfigMap. Grafana's sidecar auto-provisions it; no homelab
    # change needed.
    enabled: true

gemini:
  # Gemini model used by the chat handler and the tag-recipes job.
  model: "gemini-3.5-flash"

secretName: bluer-book-secrets

# All secret and config values live in a single 1Password item (Homelab vault).
# The onepassword-connect operator materialises a k8s Secret named `secretName`.
# Required keys: DB_USER, DB_PASS, DB_NAME, DB_HOST, DB_PORT, GOOGLE_API_KEY,
# R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_PUBLIC_URL.
# Keep DB_PASS in sync with the existing postgres PVC (currently "xxx").
onepassword:
  vault: Homelab
  item: bluer-book-secrets
