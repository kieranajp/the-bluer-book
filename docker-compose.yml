services:
  db:
    image: postgres:17.5-alpine
    ports:
      - 5432:5432
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./bluer-book", "migrate"]
    depends_on:
      - db
    env_file:
      - .env

  app:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    env_file:
      - .env

volumes:
  pgdata:
    external: true
    name: the-bluer-book-db
